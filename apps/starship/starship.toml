´╗┐"$schema" = "https://starship.rs/config-schema.json"

# Unified Starship configuration for Windows, WSL, Linux, macOS, and Termux.
# Palette is tuned for Windows Terminal One Half Light with acrylic enabled.
# left = identity, path, git; right = runtime context, duration, status, time.
add_newline = false
scan_timeout = 30
command_timeout = 500
palette = "qinta"

format = "$os$shell$hostname${custom.termux}$directory$git_branch$git_status$line_break$character"
right_format = "$python$nodejs$rust$golang$java$docker_context$jobs$cmd_duration$status$time"

[palettes.qinta]
blue = "#0184BC"
cyan = "#0997B3"
green = "#50A14F"
yellow = "#986801"
orange = "#C45A00"
red = "#E45649"
purple = "#A626A4"
fg = "#383A42"
muted = "#6A6D78"

[character]
success_symbol = "[ ÚëéšŚî(bold blue)"
error_symbol = "[ ÚëéšŚî(bold red)"
vimcmd_symbol = "[ ÚëéšöŁ(bold blue)"

[directory]
style = "bold fg"
read_only = " ŔčÇň░Á"
read_only_style = "bold red"
truncation_length = 4
truncate_to_repo = false
fish_style_pwd_dir_length = 1
home_symbol = "~"
format = "[Úíą?$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "ÚúĚ?"
style = "bold yellow"
truncation_length = 32
format = "[$symbol$branch]($style) "

[git_status]
style = "bold muted"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "=${count}"
ahead = "ÚłČ?{count}"
behind = "ÚłČ?{count}"
diverged = "ÚłČŠŤŚňÜĺ${ahead_count}ÚłČ?{behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "šŽä${count}"
deleted = "Úëü?{count}"

[cmd_duration]
min_time = 750
show_milliseconds = true
format = "[ŔčŐňŞ┐ $duration]($style) "
style = "bold muted"

[status]
disabled = false
format = "[Úëü?$status]($style) "
style = "bold red"
symbol = ""

[jobs]
symbol = "Úúą?"
style = "bold purple"
format = "[$symbol$number]($style) "

[shell]
disabled = false
format = "[ŔčÇňĽÇ $indicator]($style) "
style = "bold blue"
nu_indicator = "nu"
bash_indicator = "bash"
fish_indicator = "fish"
powershell_indicator = "pwsh"
cmd_indicator = "cmd"
unknown_indicator = "shell"

[hostname]
ssh_only = true
ssh_symbol = "š×Á?"
format = "[$ssh_symbol$hostname]($style) "
style = "bold blue"

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold muted"

[os.symbols]
Android = "ÚúČ?"
Windows = "ŔčÇňÁů "
Ubuntu = "ŔčÇŠÖą "
Debian = "ŔčÇţŚč "
Linux = "ŔčÇň░│ "
Macos = "ŔčÇÔéČ?"
Unknown = "ŔčÇšëô "

[python]
symbol = "Úí¬?"
style = "bold green"
format = '[${symbol}${pyenv_prefix}(${version})( \($virtualenv\))]($style) '
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "uv.lock", "poetry.lock"]
detect_folders = [".venv", "venv"]

[nodejs]
symbol = "Úí¬?"
style = "bold green"
format = "[$symbol($version)]($style) "
detect_files = ["package.json", ".nvmrc", "pnpm-lock.yaml", "yarn.lock", "package-lock.json", "bun.lock", "bun.lockb"]
detect_folders = ["node_modules"]

[rust]
symbol = "ÚíČ?"
style = "bold orange"
format = "[$symbol($version)]($style) "

[golang]
symbol = "ÚíŽ?"
style = "bold cyan"
format = "[$symbol($version)]($style) "

[java]
symbol = "ÚíŚ?"
style = "bold red"
format = "[$symbol($version)]($style) "

[dart]
disabled = true
symbol = "ÚíČ?"
style = "bold cyan"
format = "[$symbol($version)]($style) "

[custom.termux]
shell = ["nu", "-n", "--no-history", "-c"]
when = """
let script = if ($env.STARSHIP_CONTEXT_SCRIPT? | is-not-empty) {
  $env.STARSHIP_CONTEXT_SCRIPT
} else if ($env.HOME? | is-not-empty) {
  ($env.HOME | path join '.config' 'starship-context.nu')
} else {
  ($env.USERPROFILE | path join '.config' 'starship-context.nu')
}
if not ($script | path exists) { exit 1 }
source $script
if (__is-termux) { exit 0 } else { exit 1 }
"""
command = """
let script = if ($env.STARSHIP_CONTEXT_SCRIPT? | is-not-empty) {
  $env.STARSHIP_CONTEXT_SCRIPT
} else if ($env.HOME? | is-not-empty) {
  ($env.HOME | path join '.config' 'starship-context.nu')
} else {
  ($env.USERPROFILE | path join '.config' 'starship-context.nu')
}
if not ($script | path exists) { exit 1 }
source $script
print (__termux-label)
"""
format = "[ÚúČ?$output]($style) "
style = "bold green"

[docker_context]
format = "[Úú│?$context]($style) "
style = "bold blue"
only_with_files = true

[time]
disabled = false
time_format = "%H:%M:%S"
format = "[Úúą?$time]($style)"
style = "bold muted"

[package]
disabled = true

