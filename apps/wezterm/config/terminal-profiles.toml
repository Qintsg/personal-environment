# WezTerm 终端配置清单
# ----------------------------------------------------------------------
# 修改这个文件后，在 WezTerm 中按 Ctrl+Shift+R 重载配置。
#
# 这个文件控制两件事：
# 1. 默认打开哪个终端（default_profile）
# 2. 右键标签栏最右侧的加号按钮时，菜单里显示哪些终端
#
# 支持的类型：
# - type = "command" : 启动本地可执行程序
# - type = "ssh"     : 通过 ssh.exe 连接远程主机
# - type = "wsl"     : 打开指定的 WSL 发行版
#
# 常用字段：
# - id       : 唯一标识
# - label    : 菜单显示名称
# - icon     : 图标语义名，供 Lua 配置识别
# - enabled  : 为 false 时隐藏该项，但保留配置
# - default  : 为 true 时作为默认终端
# - cwd      : 启动目录，支持 ~/ 和 %USERPROFILE%
#
# command 类型常用字段：
# - program_candidates : 按顺序尝试的可执行程序
# - args               : 传给程序的参数
#
# SSH 最简单写法：复用 ~/.ssh/config
# [[profiles]]
# id = "ssh-work"
# label = "SSH 工作机"
# icon = "ssh"
# type = "ssh"
# host = "work-server"
# use_ssh_config = true
#
# SSH 直连写法：直接填写地址、端口、用户和密钥
# [[profiles]]
# id = "ssh-prod"
# label = "SSH 生产机"
# icon = "ssh"
# type = "ssh"
# host_name = "1.2.3.4"
# user = "root"
# port = 22
# identity_file = "~/.ssh/id_ed25519"

default_profile = "nushell"

[[profiles]]
id = "nushell"
label = "NuShell"
icon = "nu"
type = "command"
program_candidates = [
  "C:/Program Files/nu/bin/nu.exe",
  "nu.exe",
  "nu",
]
args = []
cwd = "~"
enabled = true
default = true

[[profiles]]
id = "pwsh"
label = "PowerShell"
icon = "powershell"
type = "command"
program_candidates = [
  "C:/Program Files/PowerShell/7/pwsh.exe",
  "C:/Program Files/PowerShell/7-preview/pwsh.exe",
  "C:/Windows/System32/WindowsPowerShell/v1.0/powershell.exe",
  "pwsh.exe",
  "powershell.exe",
]
args = ["-NoLogo"]
cwd = "~"
enabled = true

[[profiles]]
id = "cmd"
label = "命令提示符"
icon = "cmd"
type = "command"
program_candidates = [
  "C:/Windows/System32/cmd.exe",
  "cmd.exe",
]
args = []
cwd = "~"
enabled = true

[[profiles]]
id = "git-bash"
label = "Git Bash"
icon = "git-bash"
type = "command"
program_candidates = [
  "C:/Program Files/Git/bin/bash.exe",
  "C:/Program Files/Git/usr/bin/bash.exe",
  "bash.exe",
]
args = ["--login", "-i"]
cwd = "~"
enabled = true

# 本机安装 MSYS2 或 mingw64 后，把 enabled 改成 true 即可启用。
[[profiles]]
id = "mingw64"
label = "mingw64"
icon = "mingw64"
type = "command"
program_candidates = [
  "C:/msys64/msys2_shell.cmd",
  "C:/msys64/ucrt64.exe",
]
args = ["-mingw64", "-defterm", "-here", "-no-start"]
cwd = "~"
enabled = false

[[profiles]]
id = "ssh-home-49423"
label = "SSH 120.220.73.200:49423"
icon = "ssh"
type = "ssh"
host = "120.220.73.200"
use_ssh_config = true
cwd = "~"
enabled = true

[[profiles]]
id = "ssh-aliyun"
label = "SSH 106.14.209.7"
icon = "ssh"
type = "ssh"
host = "106.14.209.7"
use_ssh_config = true
cwd = "~"
enabled = true

[[profiles]]
id = "wsl-ubuntu"
label = "WSL Ubuntu-26.04"
icon = "linux"
type = "wsl"
distribution = "Ubuntu-26.04"
cwd = "~"
enabled = true

# 自定义终端示例。
[[profiles]]
id = "custom-example"
label = "自定义终端示例"
icon = "terminal"
type = "command"
program_candidates = [
  "C:/path/to/your/terminal.exe",
]
args = ["--example"]
cwd = "~"
enabled = false

