default_profile = "nushell"

[[profiles]]
id = "nushell"
label = "NuShell"
icon = "nu"
type = "command"
program_candidates = [
  "C:/Program Files/nu/bin/nu.exe",
  "nu.exe",
  "nu",
]
args = []
cwd = "~"
enabled = true
default = true

[[profiles]]
id = "pwsh"
label = "PowerShell"
icon = "powershell"
type = "command"
program_candidates = [
  "C:/Program Files/PowerShell/7/pwsh.exe",
  "C:/Program Files/PowerShell/7-preview/pwsh.exe",
  "C:/Windows/System32/WindowsPowerShell/v1.0/powershell.exe",
  "pwsh.exe",
  "powershell.exe",
]
args = ["-NoLogo"]
cwd = "~"
enabled = true

[[profiles]]
id = "cmd"
label = "鍛戒护鎻愮ず绗?
icon = "cmd"
type = "command"
program_candidates = [
  "C:/Windows/System32/cmd.exe",
  "cmd.exe",
]
args = []
cwd = "~"
enabled = true

[[profiles]]
id = "git-bash"
label = "Git Bash"
icon = "git-bash"
type = "command"
program_candidates = [
  "C:/Program Files/Git/bin/bash.exe",
  "C:/Program Files/Git/usr/bin/bash.exe",
  "bash.exe",
]
args = ["--login", "-i"]
cwd = "~"
enabled = true

# 鏈満瀹夎 MSYS2 鎴?mingw64 鍚庯紝鎶?enabled 鏀规垚 true 鍗冲彲鍚敤銆?[[profiles]]
id = "mingw64"
label = "mingw64"
icon = "mingw64"
type = "command"
program_candidates = [
  "C:/msys64/msys2_shell.cmd",
  "C:/msys64/ucrt64.exe",
]
args = ["-mingw64", "-defterm", "-here", "-no-start"]
cwd = "~"
enabled = false

